name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        run: npm ci || npm install
      - name: Lint
        run: npm run lint --if-present
      - name: Tests
        run: npm test --if-present
      - name: Build
        run: npm run build --if-present
